// ── Utilities ────────────────────────────────────────────────────────────────

function sumK(arr,key){ return arr.reduce((a,r)=>a+(Number(r[key])||0),0); }

function aggregate(rows){
  const leads=sumK(rows,"leads"),booked=sumK(rows,"booked"),canceled=sumK(rows,"canceled"),completed=sumK(rows,"completed"),revenue=sumK(rows,"revenue");
  return { leads,booked,canceled,completed,revenue, bookingRate:leads?booked/leads:0, cancelRate:(canceled+completed)?canceled/(canceled+completed):0, conversionRate:leads?completed/leads:0, aov:completed?revenue/completed:0 };
}

function normDate(v){ if(!v)return""; return typeof v==="string"&&!v.includes("T")?v.replace(" ","T"):v; }

function mapRows(d){
  return d.filter(r=>PARTNER_CHANNELS.includes(r["Channel Category"])).map(r=>({
    date:  normDate(r.Day||r.date||r.Month||""),
    Week:  normDate(r.Week||r.Day||r.date||""),
    Month: normDate(r.Month||r.Day||r.date||""),
    market:r.market||"", cat:r["Channel Category"]||"Other",
    leads:Number(r.leads)||0, booked:Number(r.jobs_booked)||0, canceled:Number(r.canceled_jobs)||0,
    completed:Number(r.jobs_completed)||0, revenue:Number(r.Revenue??r.revenue??0)||0
  }));
}

function getPeriodKey(row,period){ if(period==="week")return(row.Week||"").slice(0,10); if(period==="month")return(row.Month||"").slice(0,7); return(row.date||"").slice(0,10); }
function getLatestMonthKey(rows){ const k=rows.map(r=>(r.Month||"").slice(0,7)).filter(Boolean).sort(); return k.length?k[k.length-1]:""; }
function toDS(v){ if(!v)return null; const d=new Date(v); return isNaN(d.getTime())?null:d; }
function sod(d){ return new Date(d.getFullYear(),d.getMonth(),d.getDate()); }
function getRowDate(r){ return toDS(r.date||r.Week||r.Month); }

function getPeriodStartDate(pk,period){
  if(period==="week") return toDS(pk+"T12:00:00");
  if(period==="month") return toDS(pk+"-01T12:00:00");
  return null;
}
function getPeriodEndDate(pk,period){
  const s=getPeriodStartDate(pk,period); if(!s)return null;
  if(period==="week"){ const e=new Date(s); e.setDate(e.getDate()+6); return e; }
  if(period==="month") return new Date(s.getFullYear(),s.getMonth()+1,0);
  return null;
}
function countWD(s,e){
  const c=[0,0,0,0,0,0,0]; if(!s||!e||e<s)return c;
  const d=sod(s),end=sod(e); while(d<=end){c[d.getDay()]++;d.setDate(d.getDate()+1);} return c;
}
function sumArr(a){return a.reduce((x,y)=>x+y,0);}

function calcHistoricalPacing(period,rows,metricKey,lookbackDays=30){
  if(!rows?.length||!["week","month"].includes(period)||!ADDITIVE_METRICS.has(metricKey))return null;
  const allPK=rows.map(r=>getPeriodKey(r,period)).filter(Boolean).sort();
  const curPK=allPK.slice(-1)[0]; if(!curPK)return null;
  const grouped={}; rows.forEach(r=>{ const k=getPeriodKey(r,period); if(!k)return; if(!grouped[k])grouped[k]=[]; grouped[k].push(r); });
  const curRows=grouped[curPK]||[]; if(!curRows.length)return null;
  const curDates=curRows.map(getRowDate).filter(Boolean).sort((a,b)=>a-b);
  const curMax=curDates.slice(-1)[0]; if(!curMax)return null;
  const curStart=getPeriodStartDate(curPK,period),curEnd=getPeriodEndDate(curPK,period);
  if(!curStart||!curEnd)return null;
  const lbStart=new Date(curMax); lbStart.setDate(lbStart.getDate()-lookbackDays);
  const curElapsed=countWD(curStart,curMax),curFull=countWD(curStart,curEnd);
  const curActual=curRows.reduce((s,r)=>s+(Number(r[metricKey])||0),0);
  const histKeys=Object.keys(grouped).sort().filter(k=>{
    if(k===curPK)return false;
    const bs=getPeriodStartDate(k,period); return bs&&sod(bs).getTime()>=sod(lbStart).getTime();
  });
  const shares=histKeys.map(k=>{
    const g=grouped[k]||[]; if(!g.length)return null;
    const ps=getPeriodStartDate(k,period),pe=getPeriodEndDate(k,period); if(!ps||!pe)return null;
    const fwc=countWD(ps,pe),wt=[0,0,0,0,0,0,0]; g.forEach(r=>{ const d=getRowDate(r); if(!d)return; wt[d.getDay()]+=(Number(r[metricKey])||0); });
    const tot=wt.reduce((a,b)=>a+b,0); if(!tot)return null;
    let ee=0; for(let i=0;i<7;i++){ const fc=fwc[i]||0,ec=Math.min(curElapsed[i]||0,fc); if(!fc||!ec)continue; ee+=(wt[i]/fc)*ec; }
    const share=ee/tot; return(share>0&&share<=1.25)?share:null;
  }).filter(Boolean);
  if(!shares.length){
    const ed=sumArr(curElapsed),td=sumArr(curFull),fp=td>0?ed/td:null,proj=fp>0?curActual/fp:curActual;
    return{elapsed:ed,total:td,pct:fp,historicalPct:null,projected:proj,actual:curActual,method:"fallback",sampleSize:0};
  }
  const hp=Math.max(0,Math.min(shares.reduce((a,b)=>a+b,0)/shares.length,1));
  const proj=Math.max(curActual,hp>0?curActual/hp:curActual);
  return{elapsed:sumArr(curElapsed),total:sumArr(curFull),pct:hp,historicalPct:hp,projected:proj,actual:curActual,method:"weekday_weighted_historical",sampleSize:shares.length};
}

function getProjVal(key,val,pacing){ return(!pacing||key.includes("Rate")||key==="aov")?val:(pacing.projected??val); }

function applyProjToAgg(agg,pacing){
  if(!agg)return agg; const p={...agg};
  Object.keys(p).forEach(k=>{p[k]=getProjVal(k,p[k],pacing[k]);}); return p;
}

function applyProjToSeries(series,pacing){
  if(!Array.isArray(series)||!series.length)return series;
  return series.map((pt,i)=>{ if(i!==series.length-1)return pt; const pp={...pt}; Object.keys(pp).forEach(k=>{if(k!=="label")pp[k]=getProjVal(k,pp[k],pacing[k]);}); return pp; });
}

function buildTimeSeries(rows,period){
  const g={};
  rows.forEach(r=>{ const k=period==="day"?(r.date||"").slice(0,10):period==="week"?(r.Week||"").slice(0,10):(r.Month||"").slice(0,7); if(!k)return; if(!g[k])g[k]=[]; g[k].push(r); });
  return Object.keys(g).sort().slice(period==="day"?-60:-12).map(k=>{
    const a=g[k],leads=sumK(a,"leads"),booked=sumK(a,"booked"),canceled=sumK(a,"canceled"),completed=sumK(a,"completed"),revenue=sumK(a,"revenue");
    return{label:k,leads,booked,canceled,completed,revenue,bookingRate:leads?booked/leads:0,cancelRate:(canceled+completed)?canceled/(canceled+completed):0,conversionRate:leads?completed/leads:0,aov:completed?revenue/completed:0};
  });
}

function buildGroupedShareSeries(rows,period,metricKey,groupKey){
  const tk=r=>period==="day"?(r.date||"").slice(0,10):period==="week"?(r.Week||"").slice(0,10):(r.Month||"").slice(0,7);
  const allKeys=[...new Set(rows.map(tk).filter(Boolean))].sort().slice(period==="day"?-60:-12);
  const groups=[...new Set(rows.map(r=>r[groupKey]).filter(Boolean))].sort();
  const rawMap={};
  allKeys.forEach(t=>{rawMap[t]={};groups.forEach(g=>{rawMap[t][g]=[];});});
  rows.forEach(r=>{const t=tk(r),g=r[groupKey];if(t&&g&&rawMap[t]&&rawMap[t][g])rawMap[t][g].push(r);});
  return{
    series:allKeys.map(t=>{
      const pt={label:t},ta=aggregate(Object.values(rawMap[t]).flat()),tv=ta[metricKey]||0;
      groups.forEach(g=>{const ga=aggregate(rawMap[t][g]||[]);pt[g]=tv>0?(ga[metricKey]/tv)*100:0;}); return pt;
    }),groups
  };
}

function buildSeriesBreakdown(rows,period,groupKey){
  const np=period==="week"?"week":"month",gd={};
  rows.forEach(r=>{const g=r[groupKey]||"Unknown",tk=np==="week"?(r.Week||"").slice(0,10):(r.Month||"").slice(0,7);if(!tk)return;if(!gd[g])gd[g]={};if(!gd[g][tk])gd[g][tk]=[];gd[g][tk].push(r);});
  return Object.keys(gd).sort().map(g=>({group:g,points:Object.keys(gd[g]).sort().map(lbl=>{
    const a=gd[g][lbl],leads=sumK(a,"leads"),booked=sumK(a,"booked"),canceled=sumK(a,"canceled"),completed=sumK(a,"completed"),revenue=sumK(a,"revenue");
    return{label:lbl,leads,booked,canceled,completed,revenue,bookingRate:leads?booked/leads:0,cancelRate:(canceled+completed)?canceled/(canceled+completed):0,conversionRate:leads?completed/leads:0,aov:completed?revenue/completed:0};
  })}));
}

function applyProjToBreakdown(rows,period,groupKey){
  if(!["week","month"].includes(period))return buildSeriesBreakdown(rows,period,groupKey);
  return buildSeriesBreakdown(rows,period,groupKey).map(gi=>{
    const gr=rows.filter(r=>(r[groupKey]||"Unknown")===gi.group),pm={};
    METRICS.forEach(m=>{pm[m.key]=calcHistoricalPacing(period,gr,m.key);});
    return{...gi,points:applyProjToSeries(gi.points||[],pm)};
  });
}

function fmtLabel(label,period){
  if(period==="day")return new Date(label+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"});
  if(period==="week")return"W"+new Date(label+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"});
  const[y,m]=label.split("-");
  return["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][parseInt(m,10)-1]+" '"+y.slice(2);
}

function seriesColor(label,dim){ if(dim==="channel")return CAT_COLORS[label]||"#94a3b8"; const p=["#2563eb","#7c3aed","#0ea5e9","#10b981","#f59e0b","#ef4444","#14b8a6","#8b5cf6"]; let h=0,s=String(label||""); for(let i=0;i<s.length;i++)h=(h*31+s.charCodeAt(i))>>>0; return p[h%p.length]; }

async function loadData(){
  const r=await fetch(DATA_URL+"?t="+Date.now(),{cache:"no-store"});
  if(!r.ok)throw new Error(r.status);
  const d=JSON.parse(await r.text());
  if(!Array.isArray(d)||!d.length)throw new Error("empty");
  return d;
}

// ── Corp Avg Benchmark ───────────────────────────────────────────────────────

function buildCorpBenchmark(rawData,period,chanCat,overviewMonth){
  const corpMarkets=[...new Set(rawData.map(r=>r.market).filter(Boolean))].filter(m=>!PARTNER_MARKETS.includes(m));
  if(!corpMarkets.length)return null;
  const corpRows=rawData.filter(r=>corpMarkets.includes(r.market)&&(chanCat==="All Channels"||r.cat===chanCat));
  const mk=overviewMonth||getLatestMonthKey(rawData);
  const scoped=period==="month"?corpRows.filter(r=>(r.Month||"").slice(0,7)===mk):()=>{
    const ts=buildTimeSeries(corpRows,period); if(!ts.length)return[];
    const ll=ts[ts.length-1].label; return corpRows.filter(r=>getPeriodKey(r,period)===ll);
  }();
  if(!scoped.length)return null;
  const byM={};
  scoped.forEach(r=>{if(!byM[r.market])byM[r.market]=[];byM[r.market].push(r);});
  const rates={bookingRate:[],conversionRate:[],cancelRate:[]};
  Object.values(byM).forEach(mr=>{const a=aggregate(mr);rates.bookingRate.push(a.bookingRate);rates.conversionRate.push(a.conversionRate);rates.cancelRate.push(a.cancelRate);});
  const avg=k=>rates[k].length?rates[k].reduce((a,b)=>a+b,0)/rates[k].length:0;
  return{bookingRate:avg("bookingRate"),conversionRate:avg("conversionRate"),cancelRate:avg("cancelRate"),marketCount:Object.keys(byM).length};
}

// ── Viewport ─────────────────────────────────────────────────────────────────

function useViewport(){
  const gs=()=>{ if(typeof window==="undefined")return{isPhone:false,isTablet:false,isDesktop:true}; const w=Math.round(window.visualViewport?.width||window.innerWidth||1280); return{isPhone:w<640,isTablet:w>=640&&w<1024,isDesktop:w>=1024}; };
  const[s,ss]=useState(gs);
  useEffect(()=>{ const u=()=>ss(gs()); window.addEventListener("resize",u); return()=>window.removeEventListener("resize",u); },[]);
  return s;
}

// ── Sparkline ────────────────────────────────────────────────────────────────

function Sparkline({data,metricKey,color,pacing}){
  const isR=metricKey.includes("Rate")||metricKey==="aov";
  const vals=data.map((d,i)=>{ const raw=d[metricKey]||0; return(i===data.length-1&&pacing&&!isR)?pacing.projected??raw:raw; });
  if(vals.length<2)return null;
  const mn=Math.min(...vals),mx=Math.max(...vals),rng=mx-mn||1,w=80,h=28;
  const pts=vals.map((v,i)=>`${((i/(vals.length-1))*w).toFixed(1)},${(h-((v-mn)/rng)*h).toFixed(1)}`).join(" ");
  return React.createElement("svg",{width:w,height:h,style:{display:"block"}},React.createElement("polyline",{points:pts,fill:"none",stroke:color,strokeWidth:"1.5",strokeLinejoin:"round"}));
}

// ── TrendChart ───────────────────────────────────────────────────────────────

function TrendChart({data,metricKey,metric,period,chartType,pacing}){
  const[hi,setHi]=useState(null);
  const isR=metricKey.includes("Rate")||metricKey==="aov";
  const hasProj=pacing&&!isR&&["week","month"].includes(period);
  const vals=data.map((d,i)=>{ const raw=Number(d[metricKey])||0; return(i===data.length-1&&hasProj)?pacing.projected??raw:raw; });
  const actuals=data.map(d=>Number(d[metricKey])||0);
  if(!vals.length)return null;
  const fv=v=>metricKey.includes("Rate")?(v*100).toFixed(1)+"%":Math.round(v).toLocaleString();
  const fy=v=>metricKey.includes("Rate")?(v*100).toFixed(0)+"%":Math.abs(v)>=1000?(v/1000).toFixed(1)+"k":Math.round(v)+"";
  const mn=Math.min(...vals),mx=Math.max(...vals);
  let yMin=0,yMax=mx||1;
  if(metricKey.includes("Rate")){const rng=Math.max(mx-mn,0.01),pad=rng*0.18;yMin=Math.max(0,mn-pad);yMax=Math.min(1,mx+pad);if(yMax-yMin<0.04){const mid=(yMax+yMin)/2;yMin=Math.max(0,mid-0.02);yMax=Math.min(1,mid+0.02);}}
  else{const rng=Math.max(mx-mn,Math.abs(mx)*0.08,1),pad=rng*0.18;yMin=mx>0&&mn/mx<0.65?0:Math.max(0,mn-pad);yMax=mx+pad;if(yMax<=yMin)yMax=yMin+1;}
  const W=680,H=250,pL=64,pB=44,pT=18,pR=18,cW=W-pL-pR,cH=H-pB-pT,li=vals.length-1;
  const bW=Math.min(cW/vals.length-4,28),step=Math.ceil(vals.length/10),gId="lg_"+metricKey,yRng=yMax-yMin||1;
  const xP=i=>pL+(vals.length===1?cW/2:(i/(vals.length-1))*cW),yP=v=>pT+cH-((v-yMin)/yRng)*cH;
  const ticks=Array.from({length:5},(_,i)=>yMin+(yRng*i)/4);
